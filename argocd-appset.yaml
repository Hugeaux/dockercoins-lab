apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dockercoins-lab
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/Hugeaux/dockercoins-lab.git
              revision: HEAD
              directories:
                - path: deployments/*
          - list:
              elements:
                - name: webui
                  port: "80"
                  image: jpetazzo/dockercoins-webui
                - name: worker
                  port: "80"
                  image: jpetazzo/dockercoins-worker
                - name: hasher
                  port: "80"
                  image: jpetazzo/dockercoins-hasher
                - name: rng
                  port: "80"
                  image: jpetazzo/dockercoins-rng
                - name: redis
                  port: "6379"
                  image: redis
  template:
    metadata:
      name: '{{path.basename}}-{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Hugeaux/dockercoins-lab.git
        targetRevision: HEAD
        path: charts/generic-service
        helm:
          valueFiles:
            - '../../{{path}}/values.yaml'
          values: |
            service:
              port: {{port}}
            image: {{image}}
      destination:
        server: https://kubernetes.default.svc
        namespace: 'dockercoins-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
